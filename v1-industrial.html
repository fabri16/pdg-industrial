<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PDG Industrial — Soluciones eléctricas industriales</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          orange: { DEFAULT: '#F18700', 50:'#FFF4E5', 100:'#FFE3BF', 500:'#F18700', 600:'#D97A00', 700:'#A65C00' },
          ink: { 950:'#0D0D0C', 900:'#1D1D1B', 800:'#252523', 700:'#2E2E2C', 600:'#3A3A38', 500:'#575756', 400:'#7A7A78', 300:'#A8A8A6', 200:'#D6D6D4' },
          paper: '#FFFFFF',
        },
        fontFamily: {
          display: ['"Barlow Condensed"', 'Helvetica Neue Condensed', 'system-ui', 'sans-serif'],
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
      }
    }
  };
</script>

<style>
  html { scroll-behavior: smooth; }
  body { background: #0D0D0C; color: #FFFFFF; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .display { font-family: 'Barlow Condensed', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.01em; line-height: 0.95; text-transform: uppercase; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Reveal-on-scroll */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 900ms cubic-bezier(.2,.7,.2,1), transform 900ms cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal-delay-1 { transition-delay: 80ms; }
  .reveal-delay-2 { transition-delay: 160ms; }
  .reveal-delay-3 { transition-delay: 240ms; }
  .reveal-delay-4 { transition-delay: 320ms; }
  .reveal-delay-5 { transition-delay: 400ms; }

  /* Marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: marquee 40s linear infinite; }

  /* Particle drift */
  @keyframes drift { 0%{ transform: translate3d(0,0,0); opacity:.0 } 10%{opacity:.7} 90%{opacity:.7} 100%{ transform: translate3d(40px,-220px,0); opacity:0 } }
  .particle { animation: drift linear infinite; }

  /* Hero glow */
  .hero-glow {
    background:
      radial-gradient(60% 50% at 78% 55%, rgba(241,135,0,.35), transparent 60%),
      radial-gradient(40% 40% at 20% 20%, rgba(241,135,0,.10), transparent 70%);
    filter: blur(0.5px);
  }

  /* Grid texture */
  .grid-texture {
    background-image:
      linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .grid-texture-fine {
    background-image:
      linear-gradient(to right, rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Subtle scanline */
  .scanline { background: repeating-linear-gradient(180deg, rgba(255,255,255,.02) 0 1px, transparent 1px 3px); }

  /* Underline link */
  .nav-link { position: relative; }
  .nav-link::after {
    content:''; position:absolute; left:0; right:0; bottom:-6px;
    height:1px; background:#F18700; transform: scaleX(0); transform-origin: left;
    transition: transform .4s cubic-bezier(.2,.7,.2,1);
  }
  .nav-link:hover::after, .nav-link.active::after { transform: scaleX(1); }

  /* Card hover */
  .lift { transition: transform .6s cubic-bezier(.2,.7,.2,1), border-color .6s; }
  .lift:hover { transform: translateY(-4px); }

  /* Image scale on hover */
  .img-zoom img, .img-zoom .img { transition: transform 1.2s cubic-bezier(.2,.7,.2,1); }
  .img-zoom:hover img, .img-zoom:hover .img { transform: scale(1.06); }

  /* Marquee fade edges */
  .fade-x {
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  }

  /* Pulse dot */
  @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(241,135,0,.7); } 50% { box-shadow: 0 0 0 8px rgba(241,135,0,0); } }
  .pulse-dot { animation: pulse-dot 2.2s infinite; }

  /* Selection */
  ::selection { background:#F18700; color:#0D0D0C; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #252523; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #3A3A38; }
  ::-webkit-scrollbar-track { background: #0D0D0C; }

  /* ===== Responsive normalization ===== */
  html, body { overflow-x: hidden; }
  img, svg { max-width: 100%; height: auto; }
  .display { overflow-wrap: break-word; text-wrap: balance; hyphens: none; }

  /* Compact section paddings on small screens */
  @media (max-width: 640px) {
    .py-28 { padding-top: 4rem !important; padding-bottom: 4rem !important; }
    .py-32 { padding-top: 4.5rem !important; padding-bottom: 4.5rem !important; }
    .py-40 { padding-top: 5rem !important; padding-bottom: 5rem !important; }
    .py-16 { padding-top: 2.5rem !important; padding-bottom: 2.5rem !important; }
    .py-20 { padding-top: 3rem !important; padding-bottom: 3rem !important; }
    .pt-32 { padding-top: 5rem !important; }
    .pt-28 { padding-top: 4rem !important; }
    .pb-28 { padding-bottom: 4rem !important; }
    .mt-24 { margin-top: 3.5rem !important; }
    .mt-16 { margin-top: 2.5rem !important; }
    .gap-12 { gap: 2rem !important; }
  }

  /* Hide complex chrome on very small screens */
  @media (max-width: 480px) {
    .grid-texture { background-size: 40px 40px; }
  }

  /* Ensure narrow text never overflows containers */
  .mono { letter-spacing: 0.18em; }
  @media (max-width: 480px) {
    .mono { letter-spacing: 0.14em; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app-v1.jsx"></script>
</body>
</html>
